# ==========================================
# Render.com Deployment Configuration
# ==========================================

services:
  # Frontend Service
  - type: web
    name: mathkonkur-ai-frontend
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://mathkonkur-ai-backend.onrender.com/api
      - key: VITE_GAPGPT_API_KEY
        sync: false  # Set manually in Render dashboard
    routes:
      - type: rewrite
        source: /api/*
        destination: https://mathkonkur-ai-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff

  # Backend Service
  - type: web
    name: mathkonkur-ai-backend
    runtime: node
    buildCommand: cd backend && npm install && npx prisma generate && npm run build
    startCommand: cd backend && npx prisma migrate deploy && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000  # Render uses port 10000 by default
      - key: DATABASE_URL
        fromDatabase:
          name: mathkonkur-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: GAPGPT_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: FRONTEND_URL
        value: https://mathkonkur-ai-frontend.onrender.com
    healthCheckPath: /health

# Database
databases:
  - name: mathkonkur-db
    databaseName: mathkonkur
    user: mathkonkur
    plan: starter
