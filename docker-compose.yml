# ==========================================
# Docker Compose for MathKonkur AI
# ==========================================

version: '3.8'

services:
  # ==========================================
  # Frontend Service
  # ==========================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mathkonkur-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:4000/api
    depends_on:
      - backend
    networks:
      - mathkonkur-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================
  # Backend Service
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mathkonkur-backend
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/mathkonkur?schema=public
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - GAPGPT_API_KEY=${GAPGPT_API_KEY}
      - FRONTEND_URL=http://localhost:3000
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - mathkonkur-network
    restart: unless-stopped
    volumes:
      - backend-logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================
  # Database Service (PostgreSQL)
  # ==========================================
  db:
    image: postgres:15-alpine
    container_name: mathkonkur-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=mathkonkur
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - mathkonkur-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ==========================================
  # Redis Service (Caching/Sessions)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: mathkonkur-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mathkonkur-network
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ==========================================
# Volumes
# ==========================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend-logs:
    driver: local

# ==========================================
# Networks
# ==========================================
networks:
  mathkonkur-network:
    driver: bridge
